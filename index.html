<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free API Joke Generator</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #74ebe1 0%, #d4a5ec 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 450px;
            width: 90%;
        }
        h1 { color: #333; font-size: 24px; margin-bottom: 20px; }
        p { font-size: 18px; color: #555; min-height: 40px; line-height: 1.5; }
        #punchline { font-weight: bold; color: #2ecc71; margin-top: 15px; min-height: 25px; }
        button {
            background-color: #9b59b6;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.2s;
        }
        button:hover { background-color: #8e44ad; }
    </style>
</head>
<body>

    <div class="card">
        <h1>😂 Free API Joke Machine</h1>
        <p id="setup">Click the button below to fetch a live joke!</p>
        <p id="punchline"></p>
        <button onclick="getJoke()">Get New Joke</button>
    </div>

    <script>
        async function getJoke() {
            const setupElement = document.getElementById('setup');
            const punchlineElement = document.getElementById('punchline');
            
            setupElement.innerText = "Loading fresh joke...";
            punchlineElement.innerText = "";

            try {
                // FIXED: Changed back to the correct, working API endpoint address
                const response = await fetch('https://appspot.com');
                
                const data = await response.json();
                
                setupElement.innerText = data.setup;
                
                setTimeout(() => {
                    punchlineElement.innerText = data.punchline;
                }, 1500);

            } catch (error) {
                setupElement.innerText = "Oops! Failed to connect to the API server.";
                console.error("API Fetch Error:", error);
            }
        }
    </script>

</body>
</html>
